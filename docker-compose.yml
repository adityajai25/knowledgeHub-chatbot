services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-knowledgehub}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database — points to the 'db' service
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-knowledgehub}"
      # Auth
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      # HuggingFace
      HF_API_KEY: ${HF_API_KEY:-}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_GENERATION_MODEL: ${HF_GENERATION_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      HF_INFERENCE_ENDPOINT: ${HF_INFERENCE_ENDPOINT:-}
      # RAG
      CHUNK_SIZE: ${CHUNK_SIZE:-1500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      CHUNK_METADATA_LENGTH: ${CHUNK_METADATA_LENGTH:-1000}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      MAX_NEW_TOKENS: ${MAX_NEW_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      SUMMARY_SNIPPET_LENGTH: ${SUMMARY_SNIPPET_LENGTH:-3000}
      HISTORY_MESSAGE_LIMIT: ${HISTORY_MESSAGE_LIMIT:-10}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── React Frontend (Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  pgdata:
  uploads:
